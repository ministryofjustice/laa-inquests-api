# Default values for laa-inquests-api.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

environment: development

ingress:
  enabled: true
  tls:
    - hosts:
        - "laa-inquests-api.cloud-platform.service.justice.gov.uk"
  hosts:
    - host: "laa-inquests-api.cloud-platform.service.justice.gov.uk"
      paths:
        - path: /
          pathType: ImplementationSpecific